<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #f4f2fb;
        --surface: #ffffff;
        --accent: #7c3aed;
        --accent-2: #a78bfa;
        --accent-grad: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
        --me: #7c3aed;
        --peer: #ffffff;
        --text: #2b2440;
        --muted: #9890ad;
        --border: #ece8f6;
        --shadow: 0 4px 16px rgba(124, 58, 237, 0.12);
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      /* 独立窗口形态：填满整个窗口，随窗口拖拽缩放自适应（不再用固定宽高）。 */
      html, body { width: 100%; height: 100%; }
      body {
        margin: 0;
        min-width: 320px;
        font-family: -apple-system, "PingFang SC", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      .view { display: none; flex: 1; flex-direction: column; min-height: 0; }
      .view.active { display: flex; animation: viewIn 0.25s ease; }
      @keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      /* 美化滚动条 */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-thumb { background: #d9d2ee; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

      /* ---------- 登录 ---------- */
      #loginView {
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 32px 28px;
        background: var(--accent-grad);
      }
      .brand {
        width: 72px; height: 72px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.18);
        display: flex; align-items: center; justify-content: center;
        font-size: 38px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(4px);
      }
      #loginView h2 { margin: 0; color: #fff; font-size: 22px; letter-spacing: 0.5px; }
      #loginView .tagline { margin: -8px 0 4px; color: rgba(255,255,255,0.82); font-size: 12px; }
      #nick {
        width: 100%;
        padding: 12px 14px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
        background: rgba(255, 255, 255, 0.95);
        transition: box-shadow 0.2s;
      }
      #nick:focus { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5); }
      #loginView .primary {
        background: #fff;
        color: var(--accent);
        font-weight: 600;
      }
      #loginView .primary:hover { background: #f3efff; }
      #loginView .login-error {
        color: #fff;
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
        text-align: center;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }
      .primary {
        background: var(--accent-grad);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        cursor: pointer;
        font-size: 15px;
        width: 100%;
        transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
      }
      .primary:hover { box-shadow: var(--shadow); }
      .primary:active { transform: scale(0.98); }
      .primary:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

      /* ---------- 通用头部 ---------- */
      .bar {
        padding: 12px 14px;
        background: var(--accent-grad);
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
        box-shadow: 0 2px 10px rgba(124, 58, 237, 0.25);
        z-index: 1;
      }
      .bar .me { color: rgba(255,255,255,0.78); font-size: 12px; font-weight: 400; margin-left: auto; }
      .bar .back {
        cursor: pointer; color: #fff; font-weight: 500; font-size: 13px;
        padding: 3px 8px; border-radius: 8px; transition: background 0.2s;
      }
      .bar .back:hover { background: rgba(255,255,255,0.18); }
      /* 顶栏里的实体小按钮（如「下线」），半透明白底胶囊，与渐变头部协调 */
      .bar-btn {
        margin-left: 6px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        font-size: 12px;
        font-weight: 500;
        padding: 5px 12px;
        border-radius: 14px;
        cursor: pointer;
        transition: background 0.2s, transform 0.12s;
      }
      .bar-btn:hover { background: rgba(255, 255, 255, 0.3); }
      .bar-btn:active { transform: scale(0.95); }

      /* ---------- 在线列表 ---------- */
      #userList { flex: 1; overflow-y: auto; padding: 8px; }
      .user {
        padding: 12px 14px;
        margin-bottom: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: transform 0.12s, box-shadow 0.2s, border-color 0.2s;
      }
      .user:hover { transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--accent-2); }
      .user:active { transform: scale(0.99); }
      .avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--accent-grad);
        color: #fff; font-weight: 600; font-size: 16px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .user .name { flex: 1; font-size: 14px; }
      .dot {
        width: 9px; height: 9px; border-radius: 50%; background: #34d399;
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
      }
      .empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; }

      /* ---------- 聊天 ---------- */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg {
        max-width: 76%;
        padding: 8px 12px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.45;
        word-break: break-word;
        white-space: pre-wrap;
        animation: msgIn 0.2s ease;
      }
      @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      .msg.me {
        align-self: flex-end;
        background: var(--accent-grad);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
      }
      .msg.peer {
        align-self: flex-start;
        background: var(--peer);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 4px rgba(43, 36, 64, 0.05);
      }
      .msg.sys {
        align-self: center;
        background: rgba(124, 58, 237, 0.08);
        color: var(--accent);
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 10px;
      }
      /* 已读勾标记：单 ✓ 已送达 → 双 ✓✓（.read）已读 */
      .msg.me .tick {
        margin-left: 6px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
        vertical-align: bottom;
      }
      .msg.me .tick.read { color: #fff; }
      /* 输入中气泡：三个点跳动，外观同对方气泡 */
      .typing-bubble {
        align-self: flex-start;
        background: var(--peer);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        padding: 10px 12px !important;
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .typing-bubble .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        animation: typingBlink 1.2s infinite ease-in-out;
      }
      .typing-bubble .dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-bubble .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes typingBlink {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-3px); }
      }
      footer {
        display: flex;
        gap: 8px;
        padding: 10px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }
      #input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      #input:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2); }
      #input:disabled { background: #f6f4fc; }
      #sendBtn {
        background: var(--accent-grad);
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 0 18px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: transform 0.12s, opacity 0.2s;
      }
      #sendBtn:hover { opacity: 0.92; }
      #sendBtn:active { transform: scale(0.96); }
      #sendBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

      /* ---------- 来电邀请浮层 ---------- */
      #inviteOverlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(43, 36, 64, 0.5);
        backdrop-filter: blur(2px);
        align-items: center;
        justify-content: center;
      }
      #inviteOverlay.show { display: flex; animation: viewIn 0.2s ease; }
      .invite-card {
        background: #fff;
        border-radius: 18px;
        padding: 26px 22px;
        width: 80%;
        text-align: center;
        box-shadow: 0 16px 48px rgba(43, 36, 64, 0.35);
        animation: pop 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      }
      @keyframes pop { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
      #inviteText { font-size: 15px; display: block; margin-bottom: 20px; line-height: 1.5; }
      #inviteText b { color: var(--accent); }
      .invite-btns { display: flex; gap: 12px; }
      .invite-btns button {
        flex: 1;
        border: none;
        border-radius: 10px;
        padding: 11px 0;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.12s, opacity 0.2s;
      }
      .invite-btns button:active { transform: scale(0.97); }
      #acceptBtn { background: var(--accent-grad); color: #fff; }
      #rejectBtn { background: #f0edf8; color: var(--muted); }
    </style>
  </head>
  <body>
    <!-- 登录 -->
    <div id="loginView" class="view active">
      <div class="brand">🎤</div>
      <h2>open-im</h2>
      <div class="tagline">无服务端 · P2P 直连聊天</div>
      <input id="nick" placeholder="输入昵称上线" maxlength="20" />
      <button id="loginBtn" class="primary">上线</button>
      <div id="loginError" class="login-error"></div>
    </div>

    <!-- 在线列表 -->
    <div id="listView" class="view">
      <div class="bar">
        <strong>在线用户</strong>
        <span class="me" id="meLabel"></span>
        <button class="bar-btn" id="logoutBtn" title="下线并忘记昵称">下线</button>
      </div>
      <div id="userList"></div>
    </div>

    <!-- 聊天 -->
    <div id="chatView" class="view">
      <div class="bar">
        <span class="back" id="backBtn">‹ 返回</span>
        <strong id="peerName"></strong>
        <span class="me" id="chatStatus">连接中…</span>
      </div>
      <div id="messages"></div>
      <footer>
        <input id="input" placeholder="输入消息…" disabled />
        <button id="sendBtn" disabled>发送</button>
      </footer>
    </div>

    <!-- 全局来电邀请浮层 -->
    <div id="inviteOverlay">
      <div class="invite-card">
        <span id="inviteText"></span>
        <div class="invite-btns">
          <button id="acceptBtn">接听</button>
          <button id="rejectBtn">拒绝</button>
        </div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
